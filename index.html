<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>SweetPaw · Profile</title>
  <!-- Font Awesome для иконок -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    /* ----- БАЗОВЫЕ СБРОСЫ И ШРИФТЫ ----- */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      color: #f0f0f0;
      position: relative;
      overflow-x: hidden;
    }

    /* ----- ФОНОВОЕ ВИДЕО ----- */
    #bgVideo {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: -2;
    }

    /* Затемнение поверх видео */
    .video-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.4);
      z-index: -1;
    }

    /* Градиентный фон (если видео не загрузится) */
    body::before {
      content: "";
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(-45deg, #0f0c29, #1a1a2e, #16213e, #0f0c29);
      background-size: 400% 400%;
      z-index: -3;
    }

    /* ----- ОВЕРЛЕЙ «ВХОДА» (клик для запуска аудио) ----- */
    .enter-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #000;
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: opacity 0.3s, visibility 0.3s;
    }

    .enter-overlay.hidden {
      opacity: 0;
      visibility: hidden;
    }

    .enter-text {
      color: rgba(255, 255, 255, 0.7);
      font-size: 14px;
      text-transform: lowercase;
    }

    /* ----- МОБИЛЬНАЯ КНОПКА ПЕРЕКЛЮЧЕНИЯ СТАТИСТИКИ ----- */
    .mobile-toggle {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 200;
      display: none;  /* показывается только на мобильных */
      gap: 8px;
    }

    .toggle-btn {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: rgba(20, 15, 35, 0.8);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(200, 180, 255, 0.3);
      color: #d0c5ff;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 1.2rem;
    }

    .toggle-btn.active {
      background: #9f7aff;
      color: white;
    }

    /* ----- ПАНЕЛЬ СТАТИСТИКИ ПО СТРАНАМ ----- */
    .stats-panel {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 150;
      background: rgba(20, 15, 35, 0.8);
      backdrop-filter: blur(15px);
      padding: 15px 20px;
      border-radius: 20px;
      border: 1px solid rgba(200, 180, 255, 0.2);
      min-width: 200px;
      max-height: 350px;
      overflow-y: auto;
      transition: opacity 0.3s, visibility 0.3s, transform 0.3s;
    }

    .stats-panel.hidden {
      opacity: 0;
      visibility: hidden;
      transform: translateY(-10px);
      pointer-events: none;
    }

    .stats-title {
      color: #d0c5ff;
      font-size: 0.8rem;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    .country-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .country-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      color: white;
      font-size: 0.8rem;
    }

    .country-flag {
      font-size: 1.1rem;
      margin-right: 6px;
    }

    .country-count {
      color: #9f7aff;
      font-weight: 600;
    }

    /* ----- СЧЁТЧИК ПРОСМОТРОВ ----- */
    .views-counter {
      position: fixed;
      bottom: 20px;
      left: 20px;
      z-index: 150;
      background: rgba(20, 15, 35, 0.6);
      backdrop-filter: blur(10px);
      padding: 8px 16px;
      border-radius: 40px;
      border: 1px solid rgba(200, 180, 255, 0.2);
      font-size: 0.8rem;
      color: #d0c5ff;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    /* ----- ПРОФИЛЬНАЯ КАРТОЧКА ----- */
    .profile-card {
      max-width: 480px;
      width: 100%;
      background: transparent;
      border-radius: 42px;
      padding: 2rem 1.5rem;
      text-align: center;
      z-index: 10;
    }

    .avatar-wrapper {
      width: 110px;
      height: 110px;
      margin: 0 auto 1.2rem;
    }

    .avatar {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      object-fit: cover;
      border: 3px solid rgba(255, 255, 255, 0.4);
      padding: 3px;
    }

    .display-name {
      font-size: 1.8rem;
      font-weight: 600;
      color: white;
    }

    .bio {
      font-size: 0.9rem;
      color: #e0dbf5;
      margin-bottom: 1.5rem;
      padding: 0.4rem 1.2rem;
      border-left: 3px solid #9f7aff;
      display: inline-block;
    }

    /* Кнопки соцсетей */
    .links-grid {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 12px;
    }

    .link-btn {
      background: transparent;
      border: 1.5px solid rgba(200, 180, 255, 0.35);
      border-radius: 20px;
      padding: 0.7rem 1.2rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      text-decoration: none;
      color: #f0eaff;
      font-weight: 500;
      font-size: 0.95rem;
    }

    .link-btn i {
      font-size: 1.2rem;
      color: #d0c5ff;
    }

    .footer-meta {
      margin-top: 1.2rem;
      font-size: 0.7rem;
      color: #b5aed4;
      display: flex;
      justify-content: center;
      gap: 12px;
    }

    .footer-meta a {
      color: #d0c5ff;
      text-decoration: none;
    }

    /* Скрытый аудиоэлемент */
    #bgAudio {
      display: none;
    }

    /* ----- АДАПТИВ ДЛЯ МОБИЛЬНЫХ УСТРОЙСТВ ----- */
    @media (max-width: 768px) {
      body {
        padding: 0.8rem;
        padding-top: 70px;
      }

      .mobile-toggle {
        display: flex;   /* показываем кнопку статистики на мобильных */
      }

      .stats-panel {
        top: 70px;
        right: 10px;
        left: 10px;
        width: auto;
        max-height: 250px;
      }

      .views-counter {
        bottom: auto;
        top: 10px;
        left: 10px;
      }

      .profile-card {
        padding: 1rem 0.5rem;
      }
    }
  </style>
</head>
<body>
  <!-- Фоновое видео -->
  <video id="bgVideo" autoplay muted loop playsinline>
    <source src="video/background.mp4" type="video/mp4">
  </video>
  <div class="video-overlay"></div>

  <!-- Фоновая музыка (запускается по клику на оверлей) -->
  <audio id="bgAudio" loop>
    <source src="music/background.mp3" type="audio/mpeg">
  </audio>

  <!-- Кнопка для мобильных: показать/скрыть панель статистики -->
  <div class="mobile-toggle" id="mobileToggle">
    <div class="toggle-btn active" id="toggleStats">
      <i class="fas fa-chart-bar"></i>
    </div>
    <!-- Вторая кнопка (чат) убрана, так как чат удалён -->
  </div>

  <!-- Панель статистики посетителей по странам -->
  <div class="stats-panel" id="statsPanel">
    <div class="stats-title"><i class="fas fa-globe"></i> Visitors</div>
    <div class="country-list" id="countryList">
      <!-- Список стран будет заполнен динамически -->
    </div>
  </div>

  <!-- Счётчик просмотров профиля -->
  <div class="views-counter">
    <i class="fas fa-eye"></i> Views: <span id="viewCount">0</span>
  </div>

  <!-- Основная карточка профиля -->
  <div class="profile-card">
    <div class="avatar-wrapper">
      <img class="avatar" id="avatarImg" src="avatar/avatar.png"
           onerror="this.src='https://ui-avatars.com/api/?name=SweetPaw&length=2&background=2a1e3c&color=fff&size=128'">
    </div>
    <div class="display-name">SweetPaw</div>
    <div class="bio">
      <i class="fas fa-terminal" style="margin-right:6px;opacity:0.9"></i>digital creator · 19 ✦
    </div>

    <!-- Ссылки на соцсети -->
    <div class="links-grid">
      <a href="https://x.com/teriyakimoki" class="link-btn"><i class="fab fa-twitter"></i> Twitter / X</a>
      <a href="https://discord.com/users/385376961590984715" class="link-btn"><i class="fab fa-discord"></i> Discord</a>
      <a href="https://github.com/meliskaaboute" class="link-btn"><i class="fab fa-github"></i> GitHub</a>
      <a href="https://steamcommunity.com/id/ThatDamnNeil" class="link-btn"><i class="fab fa-steam"></i> Steam</a>
      <a href="https://youtube.com/playlist?list=PLPODqnI0uKxVssMZQO6cq7advtmk_Lacq" class="link-btn"><i class="fab fa-youtube"></i> YouTube</a>
      <a href="https://twitch.tv/meliska_j" class="link-btn"><i class="fab fa-twitch"></i> Twitch</a>
    </div>

    <div class="footer-meta">
      <span><i class="far fa-gem"></i> links</span> ◈
      <a href="https://t.me/std_root"><i class="far fa-envelope"></i> contact</a>
    </div>
  </div>

  <!-- Оверлей «клик для входа» (активирует аудио) -->
  <div class="enter-overlay" id="enterOverlay">
    <div class="enter-text">click to enter</div>
  </div>

  <script>
    (function() {
      // ======================== КОНФИГУРАЦИЯ ========================
      // В этой версии чат полностью удалён. Оставлены только:
      // - счётчик просмотров профиля (локальный, через localStorage)
      // - статистика посетителей по странам (использует ipapi.co)
      // - управление видимостью панели статистики (особенно для мобильных)
      // - фоновое видео и аудио (запускается по клику на оверлей)
      // ===============================================================

      // ---------- DOM ЭЛЕМЕНТЫ ----------
      const bgAudio = document.getElementById('bgAudio');
      const enterOverlay = document.getElementById('enterOverlay');
      const viewCountSpan = document.getElementById('viewCount');
      const statsPanel = document.getElementById('statsPanel');
      const countryList = document.getElementById('countryList');
      const toggleStats = document.getElementById('toggleStats');

      // ---------- ВСПОМОГАТЕЛЬНАЯ ФУНКЦИЯ: ФЛАГ ПО КОДУ СТРАНЫ ----------
      function getFlag(countryCode) {
        if (!countryCode || countryCode === 'XX') return '🌍';
        // Преобразование двухбуквенного кода в символы флага (Regional Indicator Symbols)
        return String.fromCodePoint(...countryCode.toUpperCase().split('').map(c => 127397 + c.charCodeAt()));
      }

      // Названия стран (можно расширить при необходимости)
      const countryNames = {
        RU: 'Russia', US: 'USA', GB: 'UK', DE: 'Germany', FR: 'France',
        UA: 'Ukraine', BY: 'Belarus', KZ: 'Kazakhstan', CN: 'China',
        JP: 'Japan', KR: 'S.Korea', IN: 'India', BR: 'Brazil', CA: 'Canada',
        AU: 'Australia', IT: 'Italy', ES: 'Spain', NL: 'Netherlands',
        PL: 'Poland', TR: 'Turkey'
      };

      // ---------- ОБНОВЛЕНИЕ СТАТИСТИКИ ПО СТРАНАМ ----------
      async function updateStats() {
        try {
          // Определяем страну текущего посетителя через бесплатный API (без ключа)
          const response = await fetch('https://ipapi.co/json/');
          const data = await response.json();
          const countryCode = data.country_code || 'XX';

          // Загружаем существующую статистику из localStorage
          let stats = JSON.parse(localStorage.getItem('countryStats')) || {};
          stats[countryCode] = (stats[countryCode] || 0) + 1;
          localStorage.setItem('countryStats', JSON.stringify(stats));

          // Сортируем по убыванию и берём первые 8 стран для отображения
          const sorted = Object.entries(stats)
            .sort((a, b) => b[1] - a[1])
            .slice(0, 8);

          // Рендерим список стран
          countryList.innerHTML = sorted.map(([code, count]) => {
            const flag = getFlag(code);
            const name = countryNames[code] || code;
            return `<div class="country-item">
                      <span><span class="country-flag">${flag}</span> ${name}</span>
                      <span class="country-count">${count}</span>
                    </div>`;
          }).join('');

          statsPanel.style.display = 'block';
        } catch (error) {
          console.warn('Не удалось получить данные о местоположении, статистика стран не обновлена.');
          // Если API недоступен, просто показываем сохранённые данные
          const stats = JSON.parse(localStorage.getItem('countryStats')) || {};
          const sorted = Object.entries(stats)
            .sort((a, b) => b[1] - a[1])
            .slice(0, 8);
          countryList.innerHTML = sorted.map(([code, count]) => {
            const flag = getFlag(code);
            const name = countryNames[code] || code;
            return `<div class="country-item">
                      <span><span class="country-flag">${flag}</span> ${name}</span>
                      <span class="country-count">${count}</span>
                    </div>`;
          }).join('');
        }
      }

      // ---------- ОБНОВЛЕНИЕ СЧЁТЧИКА ПРОСМОТРОВ ----------
      function updateViews() {
        let views = parseInt(localStorage.getItem('profileViews')) || 0;
        views++;
        localStorage.setItem('profileViews', views);
        viewCountSpan.textContent = views;
      }

      // ---------- ИНИЦИАЛИЗАЦИЯ СТАТИСТИКИ (ВЫЗЫВАЕТСЯ ОДИН РАЗ ЗА СЕССИЮ) ----------
      async function initStats() {
        if (!sessionStorage.getItem('statsUpdated')) {
          // Первое посещение за эту сессию — увеличиваем счётчик и обновляем страны
          updateViews();
          await updateStats();
          sessionStorage.setItem('statsUpdated', '1');
        } else {
          // Просто показываем сохранённые значения
          viewCountSpan.textContent = localStorage.getItem('profileViews') || 0;
          const stats = JSON.parse(localStorage.getItem('countryStats')) || {};
          const sorted = Object.entries(stats)
            .sort((a, b) => b[1] - a[1])
            .slice(0, 8);
          countryList.innerHTML = sorted.map(([code, count]) => {
            const flag = getFlag(code);
            const name = countryNames[code] || code;
            return `<div class="country-item">
                      <span><span class="country-flag">${flag}</span> ${name}</span>
                      <span class="country-count">${count}</span>
                    </div>`;
          }).join('');
          statsPanel.style.display = 'block';
        }
      }

      // ---------- УПРАВЛЕНИЕ ВИДИМОСТЬЮ ПАНЕЛИ СТАТИСТИКИ ----------
      toggleStats.addEventListener('click', () => {
        statsPanel.classList.toggle('hidden');
        toggleStats.classList.toggle('active');
      });

      // ---------- ЗАПУСК АУДИО И СТАТИСТИКИ ПО КЛИКУ НА ОВЕРЛЕЙ ----------
      let audioStarted = false;

      async function startSite() {
        // Запускаем фоновую музыку (если не запрещено автополитикой браузера)
        if (!audioStarted) {
          bgAudio.volume = 0.3;
          bgAudio.play().catch(() => {
            // Браузер может заблокировать автовоспроизведение — игнорируем
          });
          audioStarted = true;
        }

        // Скрываем оверлей
        enterOverlay.classList.add('hidden');

        // Инициализируем статистику (если ещё не сделано)
        initStats();
      }

      enterOverlay.addEventListener('click', startSite);

      // ---------- ПРЕДЗАГРУЗКА СТАТИСТИКИ (НА СЛУЧАЙ, ЕСЛИ ОВЕРЛЕЙ НЕ НАЖМУТ) ----------
      // Вызываем initStats без увеличения счётчика, если сессия уже была обновлена
      if (sessionStorage.getItem('statsUpdated')) {
        initStats();
      }
    })();
  </script>
</body>
</html>
