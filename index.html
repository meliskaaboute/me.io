<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SweetPaw · Live Chat</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; background: #0a0a14; color: white; }
    .container { text-align: center; }
    .chat-container { position: fixed; bottom: 20px; right: 20px; width: 350px; height: 450px; background: rgba(20,20,40,0.95); border-radius: 20px; display: flex; flex-direction: column; overflow: hidden; }
    .chat-header { padding: 15px; background: #1a1a2e; border-bottom: 1px solid #333; display: flex; justify-content: space-between; }
    .chat-messages { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
    .message { display: flex; gap: 10px; }
    .avatar { width: 30px; height: 30px; border-radius: 50%; background: #6b4cff; display: flex; align-items: center; justify-content: center; font-size: 12px; }
    .msg-content { background: #2a2a4a; padding: 8px 12px; border-radius: 15px; max-width: 80%; }
    .msg-name { font-size: 12px; color: #aabbff; margin-bottom: 3px; }
    .msg-text { font-size: 14px; }
    .chat-input-area { padding: 15px; background: #1a1a2e; display: flex; gap: 10px; }
    .chat-input { flex: 1; padding: 10px; border-radius: 20px; border: none; background: #2a2a4a; color: white; }
    .chat-send { width: 40px; height: 40px; border-radius: 50%; background: #6b4cff; border: none; color: white; cursor: pointer; }
    .status { position: fixed; bottom: 20px; left: 20px; padding: 8px 15px; background: rgba(0,0,0,0.5); border-radius: 20px; font-size: 12px; }
    .online { color: #44ff88; }
  </style>
</head>
<body>
  <div class="status">
    <span class="online">●</span> <span id="onlineCount">1</span> online | 
    <span id="syncStatus">⚡ Live</span>
  </div>

  <div class="chat-container">
    <div class="chat-header">
      <span><i class="fas fa-comments"></i> Live Chat</span>
      <span id="msgCount">0</span>
    </div>
    <div class="chat-messages" id="chatMessages">
      <div style="text-align:center;color:#666;padding:20px;">Loading messages...</div>
    </div>
    <div class="chat-input-area">
      <input type="text" class="chat-input" id="chatInput" placeholder="Type a message..." maxlength="100">
      <button class="chat-send" id="chatSend"><i class="fas fa-paper-plane"></i></button>
    </div>
  </div>

  <script>
    // ========== ВСТАВЬТЕ СВОИ КЛЮЧИ ЗДЕСЬ ==========
    const JSONBIN_API_KEY = '$2a$10$FPlK2jMNTWqD2q7nKVd8l.RmjOHBHroIRG9vK8gAUp/n7icOoQKjK'; // Получите на jsonbin.io
    const JSONBIN_BIN_ID = '69d7cc6736566621a895d987'; // Создайте bin и скопируйте ID
    // ============================================

    const chatMessages = document.getElementById('chatMessages');
    const chatInput = document.getElementById('chatInput');
    const chatSend = document.getElementById('chatSend');
    const onlineCount = document.getElementById('onlineCount');
    const msgCount = document.getElementById('msgCount');
    const syncStatus = document.getElementById('syncStatus');

    // Генерация случайного имени
    const names = ['Fox', 'Cat', 'Wolf', 'Panda', 'Tiger', 'Eagle', 'Dragon', 'Ninja', 'Pirate', 'Wizard'];
    const userName = localStorage.getItem('chatName') || names[Math.floor(Math.random() * names.length)] + Math.floor(Math.random() * 100);
    const userAvatar = userName.substring(0, 2).toUpperCase();
    localStorage.setItem('chatName', userName);

    // Функция для экранирования HTML
    function escape(s) { 
      const d = document.createElement('div'); 
      d.textContent = s; 
      return d.innerHTML; 
    }

    // Отображение сообщений
    function displayMessages(msgs) {
      if (!msgs || msgs.length === 0) {
        chatMessages.innerHTML = '<div style="text-align:center;color:#666;padding:20px;">No messages yet</div>';
        msgCount.textContent = '0';
        return;
      }
      
      chatMessages.innerHTML = msgs.slice(-50).map(m => {
        const time = new Date(m.time).toLocaleTimeString().slice(0,5);
        if (m.type === 'system') {
          return `<div style="text-align:center;color:#888;font-size:12px;padding:5px;">${escape(m.text)}</div>`;
        }
        return `
          <div class="message">
            <div class="avatar">${escape(m.avatar || '?')}</div>
            <div class="msg-content">
              <div class="msg-name">${escape(m.name)} · ${time}</div>
              <div class="msg-text">${escape(m.text)}</div>
            </div>
          </div>
        `;
      }).join('');
      
      chatMessages.scrollTop = chatMessages.scrollHeight;
      msgCount.textContent = msgs.length;
    }

    // Загрузка сообщений с JSONBin
    async function loadMessages() {
      if (!JSONBIN_API_KEY.includes('$2a$10$FPlK2jMNTWqD2q7nKVd8l.RmjOHBHroIRG9vK8gAUp/n7icOoQKjK')) {
        try {
          syncStatus.innerHTML = '🔄 Syncing...';
          const res = await fetch(`https://api.jsonbin.io/v3/b/${JSONBIN_BIN_ID}/latest`, {
            headers: { 'X-Master-Key': JSONBIN_API_KEY }
          });
          const data = await res.json();
          const msgs = data.record.messages || [];
          displayMessages(msgs);
          syncStatus.innerHTML = '⚡ Live';
        } catch(e) {
          syncStatus.innerHTML = '⚠️ Offline';
          console.error('Error loading messages:', e);
        }
      } else {
        // Без ключей - используем localStorage
        const msgs = JSON.parse(localStorage.getItem('chat_messages')) || [];
        displayMessages(msgs);
        syncStatus.innerHTML = '💾 Local';
      }
    }

    // Отправка сообщения
    async function sendMessage(text, type = 'user') {
      if (!JSONBIN_API_KEY.includes('$2a$10$FPlK2jMNTWqD2q7nKVd8l.RmjOHBHroIRG9vK8gAUp/n7icOoQKjK')) {
        try {
          syncStatus.innerHTML = '📤 Sending...';
          
          // Получаем текущие сообщения
          const getRes = await fetch(`https://api.jsonbin.io/v3/b/${JSONBIN_BIN_ID}/latest`, {
            headers: { 'X-Master-Key': JSONBIN_API_KEY }
          });
          const data = await getRes.json();
          const msgs = data.record.messages || [];
          
          // Добавляем новое
          msgs.push({ 
            text, 
            name: userName, 
            avatar: userAvatar, 
            time: Date.now(), 
            type 
          });
          
          // Ограничиваем 100 сообщениями
          if (msgs.length > 100) msgs.splice(0, msgs.length - 100);
          
          // Отправляем обратно
          await fetch(`https://api.jsonbin.io/v3/b/${JSONBIN_BIN_ID}`, {
            method: 'PUT',
            headers: {
              'Content-Type': 'application/json',
              'X-Master-Key': JSONBIN_API_KEY
            },
            body: JSON.stringify({ messages: msgs })
          });
          
          displayMessages(msgs);
          syncStatus.innerHTML = '⚡ Live';
        } catch(e) {
          syncStatus.innerHTML = '❌ Error';
          console.error('Error sending message:', e);
        }
      } else {
        // Без ключей - localStorage
        const msgs = JSON.parse(localStorage.getItem('chat_messages')) || [];
        msgs.push({ text, name: userName, avatar: userAvatar, time: Date.now(), type });
        if (msgs.length > 100) msgs.splice(0, msgs.length - 100);
        localStorage.setItem('chat_messages', JSON.stringify(msgs));
        displayMessages(msgs);
      }
    }

    // Отправка системного сообщения о входе
    async function sendJoinMessage() {
      const msgs = JSON.parse(localStorage.getItem('chat_messages')) || [];
      const recent = msgs.some(m => m.type === 'system' && m.text.includes(userName) && Date.now() - m.time < 5000);
      if (!recent) {
        await sendMessage(`${userName} joined the chat`, 'system');
      }
    }

    // Обработчики
    chatSend.addEventListener('click', () => {
      const text = chatInput.value.trim();
      if (text) {
        sendMessage(text);
        chatInput.value = '';
      }
    });

    chatInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') {
        chatSend.click();
      }
    });

    // Онлайн-счётчик (локальный)
    function updateOnline() {
      const online = JSON.parse(localStorage.getItem('chat_online') || '{}');
      const uid = localStorage.getItem('chat_uid') || 'u_' + Date.now();
      localStorage.setItem('chat_uid', uid);
      online[uid] = Date.now();
      
      const now = Date.now();
      Object.keys(online).forEach(id => {
        if (now - online[id] > 30000) delete online[id];
      });
      
      localStorage.setItem('chat_online', JSON.stringify(online));
      onlineCount.textContent = Object.keys(online).length;
    }

    // Запуск
    async function init() {
      await loadMessages();
      await sendJoinMessage();
      updateOnline();
    }

    init();

    // Периодическое обновление
    setInterval(loadMessages, 3000); // Каждые 3 секунды
    setInterval(updateOnline, 10000); // Каждые 10 секунд
  </script>
</body>
</html>
